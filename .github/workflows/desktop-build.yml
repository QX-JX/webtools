name: Desktop Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            build_args: --win
            artifact_glob: dist-release-1.0.1/*
          - os: ubuntu-latest
            label: Linux
            build_args: --linux
            artifact_glob: dist-release-1.0.1/*
          - os: macos-latest
            label: macOS
            build_args: --mac
            artifact_glob: dist-release-1.0.1/*

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run prebuild
          npx electron-builder ${{ matrix.build_args }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}-${{ github.sha }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
