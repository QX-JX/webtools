name: Desktop Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            build_args: --win
            artifact_glob: dist-release-1.0.1/*
          - os: ubuntu-latest
            label: Linux
            build_args: --linux
            artifact_glob: dist-release-1.0.1/*
          - os: macos-latest
            label: macOS
            build_args: --mac
            artifact_glob: dist-release-1.0.1/*

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Prepare cross-platform icons
        shell: bash
        run: |
          mkdir -p build-resources
          cp public/app.ico build-resources/icon.ico
          cp public/站长工具.png build-resources/512x512.png

      - name: Prepare macOS icns
        if: runner.os == 'macOS'
        shell: bash
        run: |
          rm -rf build-resources/icon.iconset
          mkdir -p build-resources/icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size public/站长工具.png --out build-resources/icon.iconset/icon_${size}x${size}.png
            sips -z $((size * 2)) $((size * 2)) public/站长工具.png --out build-resources/icon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns build-resources/icon.iconset -o build-resources/icon.icns

      - name: Build desktop app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run prebuild
          npx electron-builder ${{ matrix.build_args }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}-${{ github.sha }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
